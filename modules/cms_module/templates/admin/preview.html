{% extends "base.html" %}

{% block content %}
<div class="row g-4">
  <div class="col-12">
    <h1 class="page-title display-6 fw-semibold">{{ t["cms.admin.pages.preview"] }}</h1>
    <p class="text-muted">{{ page.title }} · {{ page.lang }}</p>
  </div>
  <div class="col-12 col-lg-3">
    {% include "admin/menu.html" %}
  </div>
  <div class="col-12 col-lg-9">
    <div class="card p-4 mb-3">
      <div class="cms-content">{{ page.content_html | safe }}</div>
    </div>
    <a class="btn btn-outline-secondary" href="/{{ lang }}/admin_panel/module_cms_module/{{ page.id }}">{{ t["cms.admin.pages.edit"] }}</a>
    <a class="btn btn-outline-dark" href="/{{ lang }}/admin_panel/module_cms_module">{{ t["cms.admin.pages.back"] }}</a>
  </div>
</div>
{% endblock %}
