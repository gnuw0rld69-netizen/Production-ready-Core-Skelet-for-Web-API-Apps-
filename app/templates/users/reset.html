{% extends "base.html" %}

{% block content %}
<div class="row g-4">
  <div class="col-12 col-lg-6">
    <div class="card p-4">
      <div class="section-title mb-3">{{ t["reset.title"] }}</div>
      <p class="text-muted">{{ t["reset.desc"] }}</p>
      <form method="post" action="/{{ lang }}/users/reset-password">
        <label class="form-label">{{ t["reset.email"] }}</label>
        <input class="form-control mb-2" name="email" type="email" required />
        {% if turnstile_site_key %}
        <div class="mb-3">
          <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}"></div>
        </div>
        {% endif %}
        <button class="btn btn-outline-warning w-100" type="submit">{{ t["reset.submit"] }}</button>
      </form>
    </div>
  </div>

  <div class="col-12 col-lg-6">
    <div class="card p-4 h-100">
      <div class="section-title mb-3">{{ t["reset.back.title"] }}</div>
      <p class="text-muted">{{ t["reset.back.desc"] }}</p>
      <a class="btn btn-outline-dark w-100" href="/{{ lang }}/users/auth">{{ t["reset.back.cta"] }}</a>
    </div>
  </div>
</div>
{% if turnstile_site_key %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
{% endif %}
{% endblock %}
